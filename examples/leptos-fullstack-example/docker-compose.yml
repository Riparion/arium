# Build the bundle on the host first, then `docker compose up -d --build`:
#
#   cargo leptos build --release
#   docker compose up -d --build
#
# The build context is the workspace root (`../..`) because the example's
# bundle lives in the shared `target/` dir. Copy `.env.example` to `.env`
# to override any of the values below.
services:
  app:
    build:
      context: ../..
      dockerfile: examples/leptos-fullstack-example/Dockerfile
    image: leptos-fullstack-example:latest
    container_name: leptos-fullstack-example
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Bind all interfaces inside the container (the Dockerfile sets the rest
      # of the LEPTOS_* config). Overriding here keeps it next to the port.
      LEPTOS_SITE_ADDR: 0.0.0.0:8080

      # Canonical absolute path inside the bind-mounted volume. `mode=rwc`
      # creates the file if missing. Pointing straight at the file (not a
      # symlink) avoids SQLite's DBMOVED check (error 1032).
      DATABASE_URL: sqlite:///app/data/auth-leptos.db?mode=rwc

      # Public URL used in mail links (verification, password reset) and for
      # computing OAuth redirect defaults.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      FROM_EMAIL: ${FROM_EMAIL:-no-reply@arium.local}

      # SMTP. Leave SMTP_HOST empty to use arium's file-backed mailer, which
      # writes .eml files into /app/data/emails (./data/emails on the host).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # First signup with this email is promoted to admin.
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}

      # Set to 1/true/yes/on to bypass email verification on signup. Dev only.
      DX_AUTH_SKIP_EMAIL_VERIFICATION: ${DX_AUTH_SKIP_EMAIL_VERIFICATION:-}

      # GitHub OAuth — set both id and secret to enable the provider.
      # GITHUB_REDIRECT_URL uses the null-value form (no `:-default`) so the
      # key is forwarded only when you actually set it: arium treats an empty
      # string as "explicitly set" and would override its built-in default
      # (http://localhost:8080/auth/github/callback). Leaving it absent lets
      # the default win.
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URL:
    volumes:
      # Bind mount so the SQLite DB (./data/auth-leptos.db) and the .eml mailer
      # output (./data/emails/) are inspectable from the host. The `user:` line
      # runs the container as your host uid/gid so those files land host-owned,
      # not root-owned; defaults to 1000:1000 if UID/GID are unset.
      - ./data:/app/data
    user: "${UID:-1000}:${GID:-1000}"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET / HTTP/1.0\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '^HTTP'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
